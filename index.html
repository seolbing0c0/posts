<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Rolling Paper</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard', sans-serif;
}

body{
    background:#ebe3d6;
    color:#222;
    min-height:100vh;
}

/* 입장 화면 */

.intro-screen{
    position:fixed;
    inset:0;
    background:#ebe3d6;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:500;
}

.intro-box{
    text-align:center;
}

.intro-title{
    font-size:42px;
    font-weight:700;
    letter-spacing:1px;
    margin-bottom:24px;
}

.enter-btn{
    border:none;
    background:#1f1f1f;
    color:white;
    padding:14px 24px;
    border-radius:16px;
    font-size:15px;
    cursor:pointer;
    transition:.15s;
}

.enter-btn:hover{
    background:#303030;
    transform:translateY(-2px);
}

/* 메인 */

.main{
    display:none;
    padding:24px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:28px;
}

.logo{
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
}

/* 관리자 버튼 */

.admin-btn{
    background:#1f1f1f;
    color:white;
    border:none;
    padding:9px 13px;
    border-radius:12px;
    font-size:12px;
    cursor:pointer;
    transition:.15s;
}

.admin-btn:hover{
    background:#303030;
}

.login-status{
    color:#666;
    font-size:13px;
    margin-bottom:22px;
}

/* 게시판 */

.board{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(270px,1fr));
    gap:20px;
}

/* 포스트잇 */

.post{
    border-radius:20px;
    overflow:hidden;
    box-shadow:
    0 8px 20px rgba(0,0,0,.08);
    transition:.2s;
}

.post:hover{
    transform:translateY(-3px);
}

.post-header{
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
}

.post-title{
    font-size:17px;
    font-weight:700;
    color:#222;
    word-break:break-word;
}

/* 화살표 */

.arrow{
    font-size:15px;
    font-weight:700;
    transition:.2s;
    opacity:.75;
}

.post.open .arrow{
    transform:rotate(90deg);
}

/* 내용 */

.post-content{

    max-height:0;

    overflow:hidden;

    transition:
    max-height .35s ease;

    background:rgba(255,255,255,.18);

    backdrop-filter:blur(4px);
}

.post.open .post-content{

    max-height:1000px;
}

.post-inner{

    padding:0 18px 18px;

    opacity:0;

    transform:translateY(-6px);

    transition:
    opacity .25s ease,
    transform .25s ease;
}

.post.open .post-inner{

    opacity:1;

    transform:translateY(0);
}

.post-text{
    white-space:pre-wrap;
    line-height:1.6;
    word-break:break-word;
    color:#222;
    margin-bottom:10px;
}

/* 날짜 */

.post-date{
    text-align:right;
    font-size:11px;
    color:rgba(0,0,0,.45);
    margin-bottom:14px;
}

/* 관리자 버튼 */

.admin-tools{
    display:flex;
    gap:8px;
}

.tool-btn{
    border:none;
    background:#1f1f1f;
    color:white;
    padding:8px 12px;
    border-radius:10px;
    font-size:13px;
    cursor:pointer;
}

.tool-btn:hover{
    background:#303030;
}

.delete{
    background:#5b2c2c;
}

.delete:hover{
    background:#703737;
}

/* 작성 버튼 */

.floating-write{
    position:fixed;
    right:24px;
    bottom:24px;
    width:64px;
    height:64px;
    border:none;
    border-radius:50%;
    background:#1f1f1f;
    color:white;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:38px;
    line-height:1;
    box-shadow:
    0 8px 25px rgba(0,0,0,.2);
    transition:.18s;
    z-index:100;
}

.floating-write:hover{
    transform:scale(1.06);
    background:#303030;
}

/* 모달 */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal.show{
    display:flex;
}

.modal-box{
    width:min(92%,520px);
    background:#f4efe7;
    border-radius:24px;
    padding:22px;
    box-shadow:
    0 15px 35px rgba(0,0,0,.2);
}

.modal-title{
    font-size:24px;
    font-weight:700;
    margin-bottom:18px;
}

/* 입력 */

.input,
.textarea,
.select{
    width:100%;
    border:none;
    background:#e4dbcd;
    border-radius:14px;
    padding:14px;
    margin-bottom:14px;
    font-size:15px;
    color:#222;
}

.input:focus,
.textarea:focus,
.select:focus{
    outline:none;
}

.textarea{
    min-height:190px;
    resize:none;
}

.count{
    text-align:right;
    font-size:13px;
    color:#666;
    margin-top:-6px;
    margin-bottom:14px;
}

/* 모달 버튼 */

.modal-bottom{
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

.modal-btn{
    border:none;
    background:#1f1f1f;
    color:white;
    padding:12px 16px;
    border-radius:12px;
    cursor:pointer;
    transition:.15s;
}

.modal-btn:hover{
    background:#303030;
}

.cancel{
    background:#8c857b;
}

.cancel:hover{
    background:#9d968b;
}

/* 모바일 */

@media(max-width:600px){

    .board{
        grid-template-columns:1fr;
    }

    .floating-write{
        width:58px;
        height:58px;
        font-size:34px;
    }

    .intro-title{
        font-size:34px;
    }
}

</style>
</head>
<body>
</body>
</html>
