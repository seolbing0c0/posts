<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Rolling Paper</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard', sans-serif;
}

body{
    background:#ebe3d6;
    color:#222;
    min-height:100vh;
}

/* 입장 화면 */

.intro-screen{
    position:fixed;
    inset:0;
    background:#ebe3d6;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:500;
}

.intro-box{
    text-align:center;
}

.intro-title{
    font-size:42px;
    font-weight:700;
    letter-spacing:1px;
    margin-bottom:24px;
}

.enter-btn{
    border:none;
    background:#1f1f1f;
    color:white;
    padding:14px 24px;
    border-radius:16px;
    font-size:15px;
    cursor:pointer;
    transition:.15s;
}

.enter-btn:hover{
    background:#303030;
    transform:translateY(-2px);
}

/* 메인 */

.main{
    display:none;
    padding:24px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:28px;
}

.logo{
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
}

/* 관리자 버튼 */

.admin-btn{
    background:#1f1f1f;
    color:white;
    border:none;
    padding:9px 13px;
    border-radius:12px;
    font-size:12px;
    cursor:pointer;
    transition:.15s;
}

.admin-btn:hover{
    background:#303030;
}

.login-status{
    color:#666;
    font-size:13px;
    margin-bottom:22px;
}

/* 게시판 */

.board{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(270px,1fr));
    gap:20px;
}

/* 포스트잇 */

.post{
    border-radius:20px;
    overflow:hidden;
    box-shadow:
    0 8px 20px rgba(0,0,0,.08);
    transition:.2s;
}

.post:hover{
    transform:translateY(-3px);
}

.post-header{
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
}

.post-title{
    font-size:17px;
    font-weight:700;
    color:#222;
    word-break:break-word;
}

/* 화살표 */

.arrow{
    font-size:15px;
    font-weight:700;
    transition:.2s;
    opacity:.75;
}

.post.open .arrow{
    transform:rotate(90deg);
}

/* 내용 */

.post-content{
    max-height:0;
    overflow:hidden;
    transition:max-height .3s ease;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(4px);
}

.post.open .post-content{
    max-height:700px;
}

.post-inner{
    padding:0 18px 18px;
}

.post-text{
    white-space:pre-wrap;
    line-height:1.6;
    word-break:break-word;
    color:#222;
    margin-bottom:10px;
}

/* 날짜 */

.post-date{
    text-align:right;
    font-size:11px;
    color:rgba(0,0,0,.45);
    margin-bottom:14px;
}

/* 관리자 버튼 */

.admin-tools{
    display:flex;
    gap:8px;
}

.tool-btn{
    border:none;
    background:#1f1f1f;
    color:white;
    padding:8px 12px;
    border-radius:10px;
    font-size:13px;
    cursor:pointer;
}

.tool-btn:hover{
    background:#303030;
}

.delete{
    background:#5b2c2c;
}

.delete:hover{
    background:#703737;
}

/* 작성 버튼 */

.floating-write{
    position:fixed;
    right:24px;
    bottom:24px;
    width:64px;
    height:64px;
    border:none;
    border-radius:50%;
    background:#1f1f1f;
    color:white;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:38px;
    line-height:1;
    box-shadow:
    0 8px 25px rgba(0,0,0,.2);
    transition:.18s;
    z-index:100;
}

.floating-write:hover{
    transform:scale(1.06);
    background:#303030;
}

/* 모달 */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal.show{
    display:flex;
}

.modal-box{
    width:min(92%,520px);
    background:#f4efe7;
    border-radius:24px;
    padding:22px;
    box-shadow:
    0 15px 35px rgba(0,0,0,.2);
}

.modal-title{
    font-size:24px;
    font-weight:700;
    margin-bottom:18px;
}

/* 입력 */

.input,
.textarea,
.select{
    width:100%;
    border:none;
    background:#e4dbcd;
    border-radius:14px;
    padding:14px;
    margin-bottom:14px;
    font-size:15px;
    color:#222;
}

.input:focus,
.textarea:focus,
.select:focus{
    outline:none;
}

.textarea{
    min-height:190px;
    resize:none;
}

.count{
    text-align:right;
    font-size:13px;
    color:#666;
    margin-top:-6px;
    margin-bottom:14px;
}

/* 모달 버튼 */

.modal-bottom{
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

.modal-btn{
    border:none;
    background:#1f1f1f;
    color:white;
    padding:12px 16px;
    border-radius:12px;
    cursor:pointer;
    transition:.15s;
}

.modal-btn:hover{
    background:#303030;
}

.cancel{
    background:#8c857b;
}

.cancel:hover{
    background:#9d968b;
}

/* 모바일 */

@media(max-width:600px){

    .board{
        grid-template-columns:1fr;
    }

    .floating-write{
        width:58px;
        height:58px;
        font-size:34px;
    }

    .intro-title{
        font-size:34px;
    }
}

</style>
</head>

<body>

<!-- 입장 -->

<div class="intro-screen" id="introScreen">

    <div class="intro-box">

        <div class="intro-title">
            ROLLING PAPER
        </div>

        <button
            class="enter-btn"
            onclick="enterSite()"
        >
            입장하기
        </button>

    </div>

</div>

<!-- 메인 -->

<div class="main" id="main">

    <div class="topbar">

        <div class="logo">
            ROLLING PAPER
        </div>

        <button
            class="admin-btn"
            onclick="adminLogin()"
        >
            관리자 로그인
        </button>

    </div>

    <div
        class="login-status"
        id="loginStatus"
    >
        관리자 로그아웃 상태
    </div>

    <div class="board" id="board"></div>

</div>

<!-- 작성 버튼 -->

<button
    class="floating-write"
    onclick="openModal()"
>
    +
</button>

<!-- 모달 -->

<div class="modal" id="modal">

    <div class="modal-box">

        <div class="modal-title">
            포스트잇 작성
        </div>

        <select class="select" id="color">
            <option value="#FFE88C">노랑</option>
            <option value="#FFC6C6">핑크</option>
            <option value="#C6F1FF">하늘</option>
            <option value="#D9FFC6">연두</option>
            <option value="#E0D0FF">보라</option>
        </select>

        <input
            type="text"
            id="titleInput"
            class="input"
            maxlength="40"
            placeholder="제목"
        >

        <textarea
            id="contentInput"
            class="textarea"
            maxlength="500"
            placeholder="내용 작성 (최대 500자)"
        ></textarea>

        <div class="count">
            <span id="count">0</span>/500
        </div>

        <div class="modal-bottom">

            <button
                class="modal-btn cancel"
                onclick="closeModal()"
            >
                취소
            </button>

            <button
                class="modal-btn"
                onclick="savePost()"
            >
                업로드
            </button>

        </div>

    </div>

</div>

<script>

function enterSite(){

    const intro =
    document.getElementById("introScreen");

    const main =
    document.getElementById("main");

    intro.remove();

    main.style.display = "block";

}

</script>

<!-- Firebase -->

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
orderBy,
query

}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyC_7KYVHTvvCpBJFy318BeEs5Ex-Qr9OtA",

    authDomain: "posts-98a17.firebaseapp.com",

    projectId: "posts-98a17"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const board =
document.getElementById("board");

const modal =
document.getElementById("modal");

const titleInput =
document.getElementById("titleInput");

const contentInput =
document.getElementById("contentInput");

const colorInput =
document.getElementById("color");

const count =
document.getElementById("count");

const loginStatus =
document.getElementById("loginStatus");

let admin = false;

let editId = null;

/* 글자 수 */

contentInput.addEventListener(

"input",

()=>{

    count.innerText =
    contentInput.value.length;

});

/* 모달 */

window.openModal = function(){

    modal.classList.add("show");

}

window.closeModal = function(){

    modal.classList.remove("show");

    titleInput.value = "";

    contentInput.value = "";

    colorInput.value = "#FFE88C";

    count.innerText = 0;

    editId = null;

}

/* 관리자 로그인 */

window.adminLogin = function(){

    const pw =
    prompt("관리자 비밀번호 입력");

    if(pw === "0624"){

        admin = true;

        loginStatus.innerText =
        "관리자 로그인 상태";

        alert("로그인 성공");

        loadPosts();

    }else{

        alert("비밀번호가 틀렸습니다.");

    }

}

/* 저장 */

window.savePost = async function(){

    const title =
    titleInput.value.trim();

    const content =
    contentInput.value.trim();

    const color =
    colorInput.value;

    if(!title || !content){

        alert("제목과 내용을 입력해주세요.");

        return;
    }

    if(editId){

        await updateDoc(

            doc(db,"posts",editId),

            {
                title,
                content,
                color
            }

        );

    }else{

        await addDoc(

            collection(db,"posts"),

            {

                title,
                content,
                color,

                createdAt:
                Date.now(),

                date:
                new Date().toLocaleDateString(
                    "ko-KR",
                    {
                        year:"numeric",
                        month:"2-digit",
                        day:"2-digit"
                    }
                )

            }

        );

    }

    closeModal();

    loadPosts();

}

/* 삭제 */

window.deletePost =
async function(id){

    if(!admin){

        alert("관리자만 가능합니다.");

        return;
    }

    if(confirm("삭제하시겠습니까?")){

        await deleteDoc(
            doc(db,"posts",id)
        );

        loadPosts();
    }

}

/* 수정 */

window.editPost =
async function(id,data){

    if(!admin){

        alert("관리자만 가능합니다.");

        return;
    }

    titleInput.value =
    data.title;

    contentInput.value =
    data.content;

    colorInput.value =
    data.color;

    count.innerText =
    data.content.length;

    editId = id;

    openModal();

}

/* 토글 */

window.togglePost = function(id){

    const allPosts =
    document.querySelectorAll(".post");

    allPosts.forEach((post)=>{

        if(post.dataset.id === id){

            post.classList.toggle("open");

        }else{

            post.classList.remove("open");

        }

    });

}

/* 진한 색 */

function getDarkerColor(color){

    const colors = {

        "#FFE88C":"#B89D2F",

        "#FFC6C6":"#B56A6A",

        "#C6F1FF":"#5D92A1",

        "#D9FFC6":"#6F9D58",

        "#E0D0FF":"#7C67A8"

    };

    return colors[color] || "#555";

}

/* 불러오기 */

async function loadPosts(){

    board.innerHTML = "";

    const q = query(

        collection(db,"posts"),

        orderBy("createdAt","desc")

    );

    const snapshot =
    await getDocs(q);

    snapshot.forEach((item)=>{

        const data =
        item.data();

        const div =
        document.createElement("div");

        div.className = "post";

        div.dataset.id = item.id;

        div.style.background =
        data.color;

        div.innerHTML = `

            <div
                class="post-header"
                onclick="togglePost('${item.id}')"
            >

                <div class="post-title">

                    ${escapeHtml(data.title)}

                </div>

                <div
                    class="arrow"
                    style="
                    color:${getDarkerColor(data.color)};
                    "
                >
                    ▶
                </div>

            </div>

            <div class="post-content">

                <div class="post-inner">

                    <div class="post-text">

                        ${escapeHtml(data.content)}

                    </div>

                    <div class="post-date">

                        ${data.date || ""}

                    </div>

                    ${
                        admin
                        ?
                        `
                        <div class="admin-tools">

                            <button
                                class="tool-btn"
                                onclick='editPost(
                                "${item.id}",
                                ${JSON.stringify(data)}
                                )'
                            >
                                수정
                            </button>

                            <button
                                class="tool-btn delete"
                                onclick='deletePost(
                                "${item.id}"
                                )'
                            >
                                삭제
                            </button>

                        </div>
                        `
                        :
                        ""
                    }

                </div>

            </div>

        `;

        board.appendChild(div);

    });

}

/* html 방지 */

function escapeHtml(text){

    return text

    .replace(/&/g,"&amp;")

    .replace(/</g,"&lt;")

    .replace(/>/g,"&gt;");

}

loadPosts();

</script>

</body>
</html>
